# ── Add these blocks inside your existing <VirtualHost> ──────────────────────
# Flask app runs in Docker on THIS bastion host, bound to loopback (127.0.0.1:5000).
# Apache reverse-proxies /cribl → Flask.
# Adjust /cribl to whatever path prefix you want.

ProxyPass        /cribl  http://127.0.0.1:5000/cribl
ProxyPassReverse /cribl  http://127.0.0.1:5000/cribl

<Location /cribl>
    Require all granted
</Location>
# ─────────────────────────────────────────────────────────────────────────────
