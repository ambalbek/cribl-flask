# ── Add these blocks inside your existing <VirtualHost> ──────────────────────
# Adjust /cribl to whatever path you want, e.g. /onboarding
#
# Flask app — Docker container on remote host via WireGuard (10.0.0.2:5000)
# No WebSocket needed (Flask replaces Streamlit).

ProxyPass        /cribl  http://10.0.0.2:5000/cribl
ProxyPassReverse /cribl  http://10.0.0.2:5000/cribl

<Location /cribl>
    Require all granted
</Location>
# ─────────────────────────────────────────────────────────────────────────────
