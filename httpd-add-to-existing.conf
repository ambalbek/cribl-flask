# ── Add these blocks inside your existing <VirtualHost> ──────────────────────
# Proxies all /cribl/* to Flask on the remote host.
#
# IMPORTANT: Do NOT add an Alias /cribl/ directive alongside these ProxyPass lines.
# Apache processes Alias in the URL translation phase (before proxying), so an
# Alias for /cribl/ would intercept /cribl/api/* requests and return static HTML
# instead of letting them reach Flask — causing "unexpected token '<'" JSON errors.
# Flask already serves the landing page at /cribl/ itself.
#
# Replace REMOTE_HOST_IP with the IP of the host running Docker.

ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"

ProxyPass        /cribl  http://REMOTE_HOST_IP:5000/cribl
ProxyPassReverse /cribl  http://REMOTE_HOST_IP:5000/cribl

ProxyPass        /health http://REMOTE_HOST_IP:5000/health
ProxyPassReverse /health http://REMOTE_HOST_IP:5000/health

<Location /cribl>
    Require all granted
</Location>
# ─────────────────────────────────────────────────────────────────────────────
