# ══════════════════════════════════════════════════════════════════════════════
# /etc/httpd/conf.d/httpd-cribl.conf
#
# Reverse proxy: bastion Apache → remote Flask app (Docker on REMOTE_HOST_IP)
#
# Replace before deploying:
#   REMOTE_HOST_IP    — IP of the host running Docker (e.g. 10.0.0.2)
#   YOUR_BASTION_FQDN — FQDN of this bastion (e.g. bastion.company.com)
#
# Required Apache modules (verify with: httpd -M):
#   proxy_module, proxy_http_module, headers_module
#
# Enable SELinux network connect (RHEL/CentOS):
#   setsebool -P httpd_can_network_connect 1
# ══════════════════════════════════════════════════════════════════════════════

# Increase timeouts — Flask spawns CLI subprocesses that can take a while
ProxyTimeout 300
Timeout      300

<VirtualHost *:80>
    ServerName YOUR_BASTION_FQDN
    ProxyPreserveHost On

    # ── Proxy ALL /cribl/* and /health to Flask ───────────────────────────────
    # NOTE: Do NOT add an Alias for /cribl/ here.
    # Alias takes precedence over ProxyPass in Apache's URL translation phase
    # and would intercept /cribl/api/* requests, returning HTML instead of JSON.
    # Flask already serves the landing page at /cribl/ itself.

    ProxyPass        /cribl  http://REMOTE_HOST_IP:5000/cribl
    ProxyPassReverse /cribl  http://REMOTE_HOST_IP:5000/cribl

    ProxyPass        /health http://REMOTE_HOST_IP:5000/health
    ProxyPassReverse /health http://REMOTE_HOST_IP:5000/health

    <Location /cribl>
        Require all granted
    </Location>

    # ── Logs ─────────────────────────────────────────────────────────────────
    ErrorLog  /var/log/httpd/cribl_error.log
    CustomLog /var/log/httpd/cribl_access.log combined

</VirtualHost>
