services:
  cribl-pusher:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"   # bind to loopback only — WireGuard/SSH tunnel reaches this
    volumes:
      - ./config.json:/app/config.json:ro          # secrets never in image
      - ./cribl_snapshots:/app/cribl_snapshots     # persist snapshots across restarts
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
